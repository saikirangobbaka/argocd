apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
spec:
  replicas: 5   # <-- number of pod replicas
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: my-container
        image: nginx:latest
        ports:
        - containerPort: 80
